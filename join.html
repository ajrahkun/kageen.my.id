<!DOCTYPE html>
<html lang='id'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no'>

  <title>Kagenou Family - Join</title>

  <link rel='icon' type='image/jpeg' href='./assets/pfp-community.jpg'>
  <link rel='stylesheet' href='./assets/join.css'>
</head>
<body>
  <div class='card'>
    <h1>Join ke Kagenou Family?</h1>
    <p>sebelum join, seleksi terlebih dahulu.</p>

    <div class='actions'>
      <button class='btn' id='goSelect'>Seleksi</button>

      <button class='btn icon' id='openModal' aria-label='Syarat Join'>
        <svg viewBox='0 0 100 100'>
          <rect x='20' y='20' width='60' height='60' transform='rotate(45 50 50)' fill='none' stroke='white' stroke-width='8' rx='6'/>
          <rect x='35' y='35' width='30' height='30' transform='rotate(45 50 50)' fill='white'/>
        </svg>
      </button>
    </div>
  </div>

  <div class='footer'>
    <a href='https://www.tiktok.com/@kagenouofficial' target='_blank' rel='noopener'>
      TikTok Account
    </a>
    |
    <span class='by'>by</span>
    <a href='https://www.tiktok.com/@sorawangyy' target='_blank' rel='noopener'>
      Jraa Hikari 愛
    </a>
  </div>

  <div class='overlay' id='modal'>
    <div class='modal'>
      <h2>Syarat Join Marga KGN</h2>
      <ol>
        <li>Pengikut minimal 50 ke atas</li>
        <li>Wajib posting konten anime</li>
        <li>Akun siap CN (Change Name)</li>
        <li>Siap pakai Hashtag tiap Post.</li>
      </ol>
    </div>
  </div>

  <script src='./assets/join.js'></script>
</body>
</html>
