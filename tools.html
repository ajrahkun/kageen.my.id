<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'/>

    <title>Kagenou Family - Tools</title>
    <meta name='description' content='Tools untuk member dari Kagenou Family.'>

    <link rel='icon' type='image/jpeg' href='./assets/image/site-logo.png'>

    <link href='https://fonts.cdnfonts.com/css/google-sans' rel='stylesheet'>

    <link rel='stylesheet' href='./assets/css/index.css?v=3'>
    <link rel='stylesheet' href='./assets/css/tools.css?v=3'>
</head>
<body>
    <div class='tools-header'>
        <h1 style='color: #fff; font-size: 2rem; margin-bottom: 5px;'>Simple Tools Kagenou</h1>
        <p style='color: #888; font-size: 0.9rem;'>Kumpulan alat pembantu sederhana untuk member di Kagenou Family.</p>
    </div>

    <div class='tools-grid'>
        <div class='tool-card'>
            <h2>
                <svg xmlns='http://www.w3.org/2000/svg' width='22' height='22' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='4 7 4 4 20 4 20 7'></polyline><line x1='9' y1='20' x2='15' y2='20'></line><line x1='12' y1='4' x2='12' y2='20'></line></svg>
                Kagenou Font Generator
            </h2>
            <p>Ubah nama di platform anda menjadi font yang tebal dan miring sesuai ketentuan CN di Kagenou Family.</p>
            <div class='tool-input-group'>
                <input type='text' id='fontInput' class='tool-input' placeholder='Masukkan nama yang anda inginkan ...' maxlength='50'>
            </div>
            <div id='statusMsg' class='status-msg'></div>
            <div id='fontResultsList' class='font-results-list'></div>
        </div>
    </div>

    <script src='./assets/js/tools.js'></script>
</body>
</html>
